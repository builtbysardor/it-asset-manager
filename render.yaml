services:
  - type: web
    name: assettrack-api
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip install psycopg2-binary==2.9.9
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assettrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false

databases:
  - name: assettrack-db
    databaseName: assettrack
    user: assettrack
    region: frankfurt
    plan: free
